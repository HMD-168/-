name: Daily Semiconductor News

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  fetch-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install feedparser requests

      - name: Run news script
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: |
          echo "=== 当前目录内容 ==="
          ls -la
          echo "=== Python 版本 ==="
          python --version
          echo "=== 测试 Python 打印 ==="
          python -c "print('hello from python')"
          echo "=== 开始执行 news_bot.py ==="
          python news_bot.py
          echo "=== 脚本执行完毕 ==="
